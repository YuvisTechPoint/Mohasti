<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="Mohasti logo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0CC0DF"/>
      <stop offset="35%" stop-color="#7DD956"/>
      <stop offset="100%" stop-color="#FFDE59"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="50%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
    <radialGradient id="lotusGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7EC8FF"/>
      <stop offset="100%" stop-color="#1E6FD9"/>
    </radialGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)" rx="24"/>
  <!-- Crescent moon -->
  <circle cx="210" cy="95" r="18" fill="#F5C6D8" opacity="0.9"/>
  <circle cx="218" cy="92" r="16" fill="url(#bg)"/>
  <!-- Gold heart line -->
  <path d="M200 130 C200 110 230 105 235 125 C240 145 200 165 200 165 C200 165 160 145 165 125 C170 105 200 110 200 130" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <path d="M200 165 Q170 200 155 230 Q145 250 160 260" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="200" y="310" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="42" font-weight="600" fill="#1A8A8F" letter-spacing="8">MOHASTI</text>
  <!-- Lotus -->
  <ellipse cx="200" cy="430" rx="55" ry="20" fill="url(#lotusGlow)" opacity="0.6"/>
  <path d="M200 400 C170 400 155 420 160 440 C165 455 185 460 200 455 C215 460 235 455 240 440 C245 420 230 400 200 400Z" fill="#1E6FD9"/>
  <path d="M200 395 C185 380 160 385 155 405 C150 420 170 435 200 430 C230 435 250 420 245 405 C240 385 215 380 200 395Z" fill="#7EC8FF" opacity="0.8"/>
  <circle cx="200" cy="420" r="8" fill="#FFFFFF" opacity="0.9"/>
</svg>
